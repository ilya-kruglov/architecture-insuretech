# Task 5. GraphQL схема для сервиса client-info

# Тип документа клиента
type Document {
  id: ID!
  type: String
  number: String
  issueDate: String
  expiryDate: String
}

# Тип родственника клиента
type Relative {
  id: ID!
  relationType: String
  name: String
  age: Int
}

# Тип клиента (основная сущность)
type Client {
  id: ID!
  name: String
  age: Int
  # Связанные сущности – запрашиваются только при необходимости
  documents: [Document!]   # список документов клиента
  relatives: [Relative!]   # список родственников клиента
}

# Корневой тип Query – все операции чтения
type Query {
  # Получить клиента по его ID. Можно также запросить его документы и/или родственников.
  client(id: ID!): Client
  
  # Альтернативно, можно запросить отдельно документы клиента (если нужны только они)
  clientDocuments(clientId: ID!): [Document!]
  
  # Отдельно родственников клиента
  clientRelatives(clientId: ID!): [Relative!]
}

# (Опционально) Schema definition – для явного указания entry point
schema {
  query: Query
}