apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaletest-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scaletest-app
  template:
    metadata:
      labels:
        app: scaletest-app
    spec:
      containers:
      - name: app
        image: scaletestapp:custom
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 64Mi