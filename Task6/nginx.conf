http {
    # Зона для ограничения запросов (10 запросов в минуту)
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/m;

    # Настройка upstream для балансировки нагрузки
    upstream backend_servers {
        server backend1.example.com;
        server backend2.example.com;
        server backend3.example.com;
    }

    server {
        listen 80;

        location / {
            # Применяем rate limiting: зона mylimit
            # burst=5 – позволяет временный всплеск до 5 дополнительных запросов (сглаживание). Необязательно.
            # nodelay – не задерживает запросы из burst, а сразу обрабатывает, но они учитываются как превышение. Необязательно.
            limit_req zone=mylimit burst=5 nodelay;
            # При превышении лимита возвращаем 429
            limit_req_status 429;

            proxy_pass http://backend_servers;
        }
    }
}